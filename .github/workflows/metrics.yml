name: Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs
  workflow_dispatch:
  # Regenerate on every push to main
  push:
    branches:
      - main

# Needed so the generated SVGs can be committed back to the repo
permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # 1) Overview card: stats, activity, repositories + language breakdown
      #    Uses METRICS_TOKEN (a PAT) — the default GITHUB_TOKEN cannot return
      #    per-repository language data, so the languages card comes out empty.
      #    Action is pinned to a fixed release (not @latest) for supply-chain safety.
      - name: Overview metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmedd-Ben-Salah
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Tunis
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_colors: github

      # 2) Full-year contribution calendar (replaces the flaky streak card)
      - name: Isocalendar metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmedd-Ben-Salah
          filename: metrics-isocalendar.svg
          base: ""
          config_timezone: Africa/Tunis
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
