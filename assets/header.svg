<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" fill="none" role="img" aria-label="Ahmed Ben Salah — Software Engineering, Cybersecurity, AI and Robotics">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36BCF7"/>
      <stop offset="100%" stop-color="#2C5364" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#36BCF7" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <style>
      .title { font: 700 52px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; fill:#ffffff; }
      .subtitle { font: 500 20px 'Fira Code', 'Consolas', monospace; fill:#9fd9f5; letter-spacing:1px; }
      .fade { opacity:0; animation: fade 1.2s ease forwards; }
      .fade2 { opacity:0; animation: fade 1.2s ease 0.4s forwards; }
      @keyframes fade { to { opacity:1; } }
      .dash { stroke-dasharray: 600; stroke-dashoffset:600; animation: draw 1.6s ease 0.3s forwards; }
      @keyframes draw { to { stroke-dashoffset:0; } }
    </style>
  </defs>

  <rect width="1200" height="220" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="220" rx="16" fill="url(#grid)"/>

  <!-- decorative glow circles -->
  <circle cx="1080" cy="40" r="120" fill="#36BCF7" opacity="0.06"/>
  <circle cx="120" cy="200" r="90" fill="#36BCF7" opacity="0.05"/>

  <!-- text block -->
  <text x="60" y="108" class="title fade">Ahmed Ben Salah</text>
  <text x="62" y="150" class="subtitle fade2">Software&#160;Engineering &#160;·&#160; Cybersecurity &#160;·&#160; AI &amp; Robotics</text>

  <!-- accent underline that draws in -->
  <line x1="62" y1="170" x2="640" y2="170" stroke="#36BCF7" stroke-width="3" stroke-linecap="round" class="dash"/>
</svg>
